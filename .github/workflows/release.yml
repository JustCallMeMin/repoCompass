name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Validate Artifacts
        run: |
          make build
          if [ ! -f "backend/bin/repocompass" ]; then
            echo "Build failed: binary not found"
            exit 1
          fi
          
          echo "Running smoke tests..."
          ./backend/bin/repocompass help
          ./backend/bin/repocompass version
          ./backend/bin/repocompass scan ./backend/testdata/fixtures/local-repositories/good-onboarding-repo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            backend/bin/repocompass
