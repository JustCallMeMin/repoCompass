name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: Coverage
        run: sh backend/scripts/dev/coverage.sh

      - name: Vet
        working-directory: backend
        run: go vet ./...

  postgres:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: repocompass
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d repocompass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/repocompass?sslmode=disable
      POSTGRES_TEST_ROLLBACK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run PostgreSQL integration tests
        run: sh backend/scripts/dev/test-postgres.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-runtime:
    name: Docker runtime
    runs-on: ubuntu-latest
    env:
      GITHUB_WEBHOOK_SECRET: ci_webhook_secret_not_for_production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Start Docker stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/v1/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color api
          exit 1

      - name: Wait for dashboard
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS -I http://localhost:3000; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color frontend
          exit 1

      - name: Run Docker smoke scans
        id: smoke
        shell: bash
        run: |
          set -euo pipefail

          local_response="$(curl -fsS -X POST http://localhost:8080/api/v1/scans \
            -H 'Content-Type: application/json' \
            -d '{"source_type":"local","path":"/workspace/backend/testdata/fixtures/local-repositories/good-onboarding-repo"}')"
          echo "$local_response"

          repository_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["data"]["repository_id"])' <<<"$local_response")"
          scan_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["data"]["scan_id"])' <<<"$local_response")"

          curl -fsS "http://localhost:8080/api/v1/repositories/${repository_id}" | python3 -m json.tool
          curl -fsS -X POST "http://localhost:8080/api/v1/repositories/${repository_id}/scans" | python3 -m json.tool
          curl -fsS "http://localhost:8080/api/v1/scans/${scan_id}" | python3 -m json.tool
          curl -fsS "http://localhost:8080/api/v1/repositories/${repository_id}/scans" | python3 -m json.tool
          curl -fsS "http://localhost:8080/api/v1/scans/${scan_id}/findings" | python3 -m json.tool
          curl -fsS "http://localhost:8080/api/v1/scans/${scan_id}/assessment" | python3 -m json.tool
          curl -fsS "http://localhost:8080/api/v1/scans/${scan_id}/reports" | python3 -m json.tool
          curl -fsS "http://localhost:8080/api/v1/repositories/${repository_id}/metrics" | python3 -m json.tool

          github_response="$(curl -fsS -X POST http://localhost:8080/api/v1/scans \
            -H 'Content-Type: application/json' \
            -d '{"source_type":"github","url":"https://github.com/octocat/Hello-World"}')"
          echo "$github_response" | python3 -m json.tool

      - name: Run offline CLI demo smoke
        run: make demo

      - name: Collect Docker logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
