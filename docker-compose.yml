services:
  postgres:
    image: postgres:16
    container_name: repocompass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: repocompass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - repocompass-postgres-data:/var/lib/postgresql/data

volumes:
  repocompass-postgres-data:
